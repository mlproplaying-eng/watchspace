<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WatchSpace</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0a0e1a; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 0; margin: 0; }
        .app { max-width: 390px; width: 100%; height: 100vh; max-height: 844px; background: #0a0e1a; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px 8px; background: rgba(10,14,26,0.95); border-bottom: 1px solid rgba(255,255,255,0.04); flex-shrink: 0; z-index: 10; }
        .header .logo { font-size: 20px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; }
        .header .logo .icon { width: 32px; height: 32px; background: linear-gradient(135deg, #4a7cf7, #6c5ce7); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .header .logo span { background: linear-gradient(135deg, #4a7cf7, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .points { background: rgba(74,124,247,0.12); padding: 4px 14px; border-radius: 30px; color: #7a9cff; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 4px; }
        .header .back { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.06); color: #a8b9d9; padding: 6px 14px; border-radius: 30px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        
        .content { flex: 1; overflow-y: auto; padding: 0 12px 70px; }
        .content::-webkit-scrollbar { width: 0; }

        .player-wrapper { background: #000; border-radius: 16px; overflow: hidden; margin: 12px 0; aspect-ratio: 16/9; position: relative; }
        .player-wrapper iframe { width: 100%; height: 100%; border: none; }
        .player-wrapper .placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a2a4a, #0a0e1a); color: #5a6f95; gap: 12px; text-align: center; padding: 20px; }
        .player-wrapper .placeholder .big-icon { font-size: 48px; opacity: 0.4; }
        .player-wrapper .placeholder h4 { color: #a8c0ee; font-size: 16px; }

        .video-title { color: #fff; font-size: 17px; font-weight: 600; margin-top: 8px; }
        .video-meta { color: #5a6f95; font-size: 13px; margin-top: 4px; }

        .input-row { display: flex; gap: 8px; margin: 8px 0; }
        .input-row input { flex: 1; padding: 12px 16px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.04); color: #fff; font-size: 14px; outline: none; }
        .input-row input::placeholder { color: #5a6f95; }
        .input-row input:focus { border-color: #4a7cf7; }
        .input-row button { padding: 12px 20px; border-radius: 30px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; }
        .input-row .btn-add { background: linear-gradient(135deg, #4a7cf7, #6c5ce7); color: white; }
        .input-row .btn-youtube { background: #ff0000; color: white; }

        .section { margin-top: 16px; }
        .section-title { color: #fff; font-size: 16px; font-weight: 600; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .section-title .see-all { color: #5a6f95; font-size: 12px; cursor: pointer; }

        .room-card { background: rgba(18,26,48,0.6); border-radius: 14px; padding: 14px; border: 1px solid rgba(255,255,255,0.04); margin-bottom: 8px; }
        .room-card .top { display: flex; justify-content: space-between; align-items: center; }
        .room-card .top .name { color: #fff; font-weight: 600; font-size: 15px; }
        .room-card .top .badge { font-size: 10px; padding: 2px 12px; border-radius: 30px; font-weight: 600; }
        .room-card .top .badge.open { background: rgba(46,204,113,0.15); color: #2ecc71; }
        .room-card .top .badge.closed { background: rgba(231,76,60,0.15); color: #e74c3c; }
        .room-card .members { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
        .room-card .members .member { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #2a3d66, #1a2a4a); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #a8c0ee; border: 2px solid #0a0e1a; }
        .room-card .members .member.online { border-color: #2ecc71; }
        .room-card .members .member.creator { border-color: #ffd700; }
        .room-card .actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .room-card .actions button { padding: 6px 16px; border-radius: 30px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
        .room-card .actions .join { background: linear-gradient(135deg, #4a7cf7, #6c5ce7); color: white; }
        .room-card .actions .invite { background: rgba(255,255,255,0.05); color: #a8b9d9; border: 1px solid rgba(255,255,255,0.06); }
        .room-card .actions .enter { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }

        .create-room-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .create-room-modal .modal {
            background: #1a2a4a;
            border-radius: 20px;
            padding: 24px;
            max-width: 340px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .create-room-modal .modal h3 { color: #fff; font-size: 18px; margin-bottom: 12px; }
        .create-room-modal .modal input, .create-room-modal .modal select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 14px;
            outline: none;
            margin-bottom: 10px;
        }
        .create-room-modal .modal input::placeholder { color: #5a6f95; }
        .create-room-modal .modal input:focus, .create-room-modal .modal select:focus { border-color: #4a7cf7; }
        .create-room-modal .modal select option { background: #1a2a4a; color: #fff; }
        .create-room-modal .modal .btns { display: flex; gap: 10px; margin-top: 12px; }
        .create-room-modal .modal .btns button { flex: 1; padding: 10px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; }
        .create-room-modal .modal .btns .cancel { background: rgba(255,255,255,0.05); color: #5a6f95; }
        .create-room-modal .modal .btns .create { background: linear-gradient(135deg, #4a7cf7, #6c5ce7); color: white; }

        .room-inside { padding: 4px 0; }
        .room-inside .room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .room-inside .room-header h2 { color: #fff; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .room-inside .room-header .online-count { color: #5a6f95; font-size: 13px; }
        .room-inside .member-list { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
        .room-inside .member-list .m { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.04); padding: 4px 12px 4px 4px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.04); }
        .room-inside .member-list .m .av { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #2a3d66, #1a2a4a); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #a8c0ee; }
        .room-inside .member-list .m .av.online { border: 2px solid #2ecc71; }
        .room-inside .member-list .m .av.creator { border: 2px solid #ffd700; }
        .room-inside .member-list .m .name { color: #a8b9d9; font-size: 12px; }
        .room-inside .member-list .m .crown { color: #ffd700; font-size: 12px; }
        .room-inside .chat-area { background: rgba(255,255,255,0.02); border-radius: 14px; padding: 12px; max-height: 120px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.03); }
        .room-inside .chat-area .msg { margin-bottom: 4px; }
        .room-inside .chat-area .msg .user { color: #7a9cff; font-weight: 600; font-size: 12px; }
        .room-inside .chat-area .msg .text { color: #e0e8f8; font-size: 13px; }
        .room-inside .chat-area .msg .time { color: #5a6f95; font-size: 10px; margin-left: 6px; }
        .room-inside .chat-input { display: flex; gap: 8px; margin-top: 8px; }
        .room-inside .chat-input input { flex: 1; padding: 8px 14px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.04); color: #fff; font-size: 13px; outline: none; }
        .room-inside .chat-input input::placeholder { color: #5a6f95; }
        .room-inside .chat-input button { padding: 8px 16px; border-radius: 30px; border: none; background: linear-gradient(135deg, #4a7cf7, #6c5ce7); color: white; font-weight: 600; cursor: pointer; }

        .btn-row { display: flex; gap: 8px; margin: 8px 0; flex-wrap: wrap; }
        .btn-row .btn { flex: 1; min-width: 80px; padding: 10px; border-radius: 30px; border: none; font-weight: 600; font-size: 13px; cursor: pointer; text-align: center; }
        .btn-row .btn-youtube { background: #ff0000; color: white; }
        .btn-row .btn-clear { background: rgba(255,255,255,0.05); color: #5a6f95; border: 1px solid rgba(255,255,255,0.06); }
        .btn-row .btn-create { background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; }

        .friends-list { display: flex; flex-direction: column; gap: 8px; }
        .friend-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; background: rgba(18,26,48,0.6); border-radius: 14px; border: 1px solid rgba(255,255,255,0.04); }
        .friend-item .avatar { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #2a3d66, #1a2a4a); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: #a8c0ee; flex-shrink: 0; position: relative; }
        .friend-item .avatar .online { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; border: 2px solid #0a0e1a; }
        .friend-item .avatar .offline { position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; background: #5a6f95; border-radius: 50%; border: 2px solid #0a0e1a; }
        .friend-item .info { flex: 1; }
        .friend-item .info .name { color: #fff; font-weight: 600; font-size: 14px; }
        .friend-item .info .status { color: #5a6f95; font-size: 12px; }
        .friend-item .points-badge { background: rgba(255,215,0,0.08); padding: 2px 12px; border-radius: 30px; color: #ffd700; font-size: 12px; font-weight: 600; }

        .friend-requests { background: rgba(18,26,48,0.6); border-radius: 14px; padding: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.04); }
        .friend-requests .title { color: #5a6f95; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .friend-request-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 4px; }
        .friend-request-item .avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #2a3d66, #1a2a4a); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #a8c0ee; flex-shrink: 0; }
        .friend-request-item .name { flex: 1; color: #fff; font-size: 14px; font-weight: 500; }
        .friend-request-item .btns { display: flex; gap: 6px; }
        .friend-request-item .btns button { padding: 4px 14px; border-radius: 30px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; }
        .friend-request-item .btns .accept { background: #2ecc71; color: white; }
        .friend-request-item .btns .reject { background: rgba(255,255,255,0.05); color: #5a6f95; }

        .profile-card { background: linear-gradient(145deg, rgba(18,26,48,0.8), rgba(10,14,30,0.9)); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.04); display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
        .profile-card .avatar { width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, #4a7cf7, #6c5ce7); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 700; color: white; flex-shrink: 0; }
        .profile-card .info { flex: 1; }
        .profile-card .info h3 { color: #fff; font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .profile-card .info h3 .nick { color: #5a6f95; font-size: 13px; font-weight: 400; }
        .profile-card .info p { color: #5a6f95; font-size: 13px; }
        .profile-card .level { background: rgba(255,215,0,0.12); padding: 4px 14px; border-radius: 30px; color: #ffd700; font-size: 13px; font-weight: 600; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
        .stats-grid .stat { background: rgba(255,255,255,0.03); border-radius: 14px; padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        .stats-grid .stat .num { color: #fff; font-size: 18px; font-weight: 700; }
        .stats-grid .stat .label { color: #5a6f95; font-size: 10px; display: block; margin-top: 2px; }

        .gifts-section { margin: 16px 0; }
        .gifts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .gift-card { background: rgba(18,26,48,0.6); border-radius: 14px; padding: 16px 8px; text-align: center; border: 1px solid rgba(255,255,255,0.04); }
        .gift-card .icon { font-size: 32px; }
        .gift-card .name { color: #fff; font-size: 12px; font-weight: 600; margin-top: 4px; }
        .gift-card .price { color: #ffd700; font-size: 11px; font-weight: 600; }
        .gift-card .btn-gift { margin-top: 6px; padding: 4px 16px; border-radius: 30px; border: none; background: linear-gradient(135deg, #4a7cf7, #6c5ce7); color: white; font-size: 11px; font-weight: 600; cursor: pointer; }

        .withdraw-section { background: rgba(18,26,48,0.6); border-radius: 16px; padding: 16px; border: 1px solid rgba(255,255,255,0.04); margin: 12px 0; opacity: 0.6; position: relative; }
        .withdraw-section .disabled-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 4px;
            backdrop-filter: blur(2px);
        }
        .withdraw-section .disabled-overlay .soon-text { color: #ffd700; font-size: 16px; font-weight: 700; }
        .withdraw-section .disabled-overlay .soon-sub { color: #5a6f95; font-size: 12px; }

        .games-soon { text-align: center; padding: 60px 20px; background: rgba(18,26,48,0.6); border-radius: 20px; border: 1px solid rgba(255,255,255,0.04); }
        .games-soon .icon { font-size: 64px; margin-bottom: 12px; opacity: 0.4; }
        .games-soon h3 { color: #a8c0ee; font-size: 20px; font-weight: 700; }
        .games-soon p { color: #5a6f95; font-size: 14px; margin-top: 4px; }

        .playlist { margin-top: 8px; }
        .playlist .title { color: #5a6f95; font-size: 12px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .playlist-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: rgba(18,26,48,0.6); border-radius: 12px; border: 1px solid rgba(255,255,255,0.04); margin-bottom: 4px; cursor: pointer; transition: all 0.2s ease; }
        .playlist-item:active { transform: scale(0.97); }
        .playlist-item .num { color: #5a6f95; font-size: 11px; min-width: 20px; }
        .playlist-item .info { flex: 1; }
        .playlist-item .info h4 { color: #fff; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .playlist-item .info .meta { color: #5a6f95; font-size: 10px; }
        .playlist-item .remove-btn { background: none; border: none; color: #5a6f95; font-size: 14px; cursor: pointer; padding: 4px; }
        .playlist-item.active { background: rgba(74,124,247,0.08); border-color: rgba(74,124,247,0.15); }

        .activity-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .activity-card { background: rgba(18,26,48,0.6); border-radius: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: all 0.2s ease; }
        .activity-card:active { transform: scale(0.97); }
        .activity-card .thumb { height: 90px; background: linear-gradient(135deg, #1a2a4a, #2a3d66); display: flex; align-items: center; justify-content: center; font-size: 36px; background-size: cover; background-position: center; position: relative; }
        .activity-card .thumb .duration { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.8); padding: 2px 10px; border-radius: 30px; font-size: 9px; color: #fff; }
        .activity-card .info { padding: 8px 10px 10px; }
        .activity-card .info h4 { color: #fff; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .activity-card .info .watched-by { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .activity-card .info .watched-by .avatars { display: flex; }
        .activity-card .info .watched-by .avatars .av { width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, #2a3d66, #1a2a4a); display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 600; color: #a8c0ee; border: 2px solid #0a0e1a; margin-right: -4px; }
        .activity-card .info .watched-by .text { color: #5a6f95; font-size: 9px; }

        .empty-state { text-align: center; padding: 40px 20px; color: #5a6f95; }
        .empty-state .icon { font-size: 48px; opacity: 0.3; margin-bottom: 12px; }
        .empty-state h4 { color: #a8c0ee; font-size: 16px; margin-bottom: 6px; }
        .empty-state p { font-size: 13px; line-height: 1.5; }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 8px 14px;
            background: rgba(10,14,26,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
            z-index: 10;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            padding: 4px 8px;
            border: none;
            background: none;
            min-width: 56px;
            position: relative;
            transition: all 0.2s ease;
        }
        .nav-item .icon-wrap {
            width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; position: relative;
        }
        .nav-item .icon-wrap .svg-icon { width: 26px; height: 26px; fill: #4a5568; transition: all 0.3s ease; }
        .nav-item .label { font-size: 10px; color: #4a5568; font-weight: 500; transition: all 0.3s ease; }
        .nav-item.active .icon-wrap { background: rgba(74,124,247,0.12); }
        .nav-item.active .icon-wrap .svg-icon { fill: #4a7cf7; }
        .nav-item.active .label { color: #4a7cf7; }
        .nav-item .badge { position: absolute; top: 0; right: 0; background: #e74c3c; color: white; font-size: 9px; font-weight: 700; padding: 1px 8px; border-radius: 30px; min-width: 18px; text-align: center; }
        .nav-item:active { transform: scale(0.92); }
        .bottom-nav.hidden { display: none; }

        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 14px; z-index: 99; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .confirm-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .confirm-modal .modal { background: #1a2a4a; border-radius: 20px; padding: 24px; max-width: 300px; width: 100%; border: 1px solid rgba(255,255,255,0.06); text-align: center; }
        .confirm-modal .modal h3 { color: #fff; font-size: 18px; margin-bottom: 8px; }
        .confirm-modal .modal p { color: #5a6f95; font-size: 14px; margin-bottom: 16px; }
        .confirm-modal .modal .btns { display: flex; gap: 10px; }
        .confirm-modal .modal .btns button { flex: 1; padding: 10px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; }
        .confirm-modal .modal .btns .no { background: rgba(255,255,255,0.05); color: #5a6f95; }
        .confirm-modal .modal .btns .yes { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; }

        @media (max-width: 420px) { body { padding: 0; } .app { max-height: 100vh; border-radius: 0; } .content { padding: 0 12px 70px; } }
    </style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script>
(function() {
    const { useState, useEffect, useRef } = React;

    // ============================================================
    // ТЕКУЩИЙ ПОЛЬЗОВАТЕЛЬ
    // ============================================================
    const CURRENT_USER = { id: 1, name: 'Алексей', nick: '@alex_play', avatar: 'А', points: 0, watched: 0 };

    // ============================================================
    // YOUTUBE
    // ============================================================
    async function getYouTubeTitle(url) {
        const videoId = extractVideoId(url);
        if (!videoId) return { title: 'Неизвестное видео', videoId: videoId };
        try {
            const response = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            return { title: data.title, videoId: videoId, author: data.author_name };
        } catch (e) {
            try {
                const response2 = await fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`);
                if (!response2.ok) throw new Error();
                const data2 = await response2.json();
                return { title: data2.title, videoId: videoId, author: data2.author_name };
            } catch (e2) {
                return { title: `Видео ${videoId}`, videoId: videoId };
            }
        }
    }

    function extractVideoId(url) {
        const patterns = [
            /(?:v=|\/)([a-zA-Z0-9_-]{11})/,
            /youtu\.be\/([a-zA-Z0-9_-]{11})/,
            /embed\/([a-zA-Z0-9_-]{11})/
        ];
        for (const pattern of patterns) {
            const match = url.match(pattern);
            if (match) return match[1];
        }
        return null;
    }

        get(key, def) { try { const data = localStorage.getItem('watchspace_' + key); return data ? JSON.parse(data) : def; } catch { return def; } },

            addPoints(20);
        };

        const rejectFriend = (id) => {
            const request = friendRequests.find(r => r.id === id);
            setFriendRequests(friendRequests.filter(r => r.id !== id));

                online: [user.name],

            setRooms(updatedRooms);

            setNewRoomPassword('');
            setCurrentRoom(newRoom);

            setTimeout(() => setToast(null), 2000);
        };

        const joinRoom = (roomId, password) => {

            if (room.type === 'closed' && room.password !== password) {
                setToast('❌ Неверный пароль');
                setTimeout(() => setToast(null), 2000);
                return;
            }

                    }
                    return r;

                setRooms(updated);
                setCurrentRoom(room);
                setToast(`✅ Вы вошли в "${room.name}"`);
                setTimeout(() => setToast(null), 2000);
            } else {
                setCurrentRoom(room);
                setToast(`✅ Вы вошли в "${room.name}"`);
                setTimeout(() => setToast(null), 2000);
            }

        const leaveRoom = (roomId) => {
            const room = rooms.find(r => r.id === roomId);
            if (!room) return;

            if (room.creator === user.name) {
                setShowConfirm({
                    message: 'Вы создатель комнаты. При выходе комната будет удалена. Продолжить?',

                setTimeout(() => setToast(null), 2000);
                return;
